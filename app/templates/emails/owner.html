<!doctype html>
<html lang="ru">
  <body>
    <h1>Новое обращение #{{ contact.id }}</h1>
    <p><strong>Имя:</strong> {{ contact.name }}</p>
    <p><strong>Email:</strong> {{ contact.email }}</p>
    <p><strong>Телефон:</strong> {{ contact.phone }}</p>
    <p><strong>Комментарий:</strong></p>
    <p>{{ contact.comment }}</p>
    <hr>
    <p><strong>Категория:</strong> {{ contact.category }}</p>
    <p><strong>Тональность:</strong> {{ contact.sentiment }}</p>
    <p><strong>Приоритет:</strong> {{ contact.priority }}</p>
  </body>
</html>
