services:
  - type: web
    name: developer-landing-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: METRICS_API_KEY
        generateValue: true
      - key: EMAIL_MODE
        value: smtp
      - key: OPENAI_MODEL
        value: gpt-5.6-luna
      - key: CORS_ORIGINS
        sync: false
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: OWNER_EMAIL
        sync: false
